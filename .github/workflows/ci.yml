name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...
        env:
          GOEXPERIMENT: jsonv2

      - name: Format check
        run: test -z "$(gofmt -s -l .)"

      - name: Test
        run: go test ./...
        env:
          GOEXPERIMENT: jsonv2
