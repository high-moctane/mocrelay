version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: thursday
      timezone: Asia/Tokyo
    commit-message:
      prefix: "deps"
    reviewers:
      - high-moctane
    ignore:
      - dependency-name: "go"
      - dependency-name: "toolchain"
    groups:
      all-dependencies:
        patterns:
          - "*"
